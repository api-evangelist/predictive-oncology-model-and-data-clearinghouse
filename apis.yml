apis:
  - aid: predictive-oncology-model-and-data-clearinghouse:modac-api
    name: MoDaC REST API
    description: >-
      The MoDaC REST API provides programmatic access to upload and download assets, manage associated metadata, and
      search for assets against these metadata. Assets include datasets and machine learning models contributed by the
      cancer research community. The API is documented in OpenAPI 3.0 format and exposes endpoints for bulk
      registration, data object and collection management, metadata queries, and permissions handling.
    humanURL: https://modac.cancer.gov/
