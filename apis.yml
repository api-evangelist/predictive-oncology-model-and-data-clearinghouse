aid: predictive-oncology-model-and-data-clearinghouse
name: Predictive Oncology Model and Data Clearinghouse
description: >-
  The Predictive Oncology Model and Data Clearinghouse (MoDaC) is a National Cancer Institute platform that supports
  cancer research through advanced algorithms and machine learning techniques to analyze complex datasets, including
  genetic information, clinical data, and imaging studies. MoDaC serves as a centralized hub for storing, sharing, and
  discovering cancer research datasets and trained models, fostering collaboration among researchers and accelerating
  the advancement of cancer therapies.
kind: contract
position: Consumer
access: 3rd-Party
