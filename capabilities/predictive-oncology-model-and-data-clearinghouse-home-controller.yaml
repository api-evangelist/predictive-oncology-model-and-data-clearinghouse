naftiko: 1.0.0-alpha2
info:
  label: MoDaC API — home-controller
  description: 'MoDaC API — home-controller. 1 operations. Lead operation: home-controller. Self-contained Naftiko capability
    covering one Predictive Oncology Model And Data Clearinghouse business surface.'
  tags:
  - Predictive Oncology Model And Data Clearinghouse
  - home-controller
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PREDICTIVE_ONCOLOGY_MODEL_AND_DATA_CLEARINGHOUSE_API_KEY: PREDICTIVE_ONCOLOGY_MODEL_AND_DATA_CLEARINGHOUSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: predictive-oncology-model-and-data-clearinghouse-home-controller
    baseUri: http://localhost:8080
    description: MoDaC API — home-controller business capability. Self-contained, no shared references.
    resources:
    - name: metaDataPermissionsList
      path: /metaDataPermissionsList
      operations:
      - name: savepermissionslist
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: collectionId
          in: query
          type: string
          required: true
        - name: path
          in: query
          type: string
          required: true
        - name: selectedPermissions[]
          in: query
          type: array
  exposes:
  - type: rest
    namespace: predictive-oncology-model-and-data-clearinghouse-home-controller-rest
    port: 8080
    description: REST adapter for MoDaC API — home-controller. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/metadatapermissionslist
      name: metadatapermissionslist
      description: REST surface for metaDataPermissionsList.
      operations:
      - method: POST
        name: savepermissionslist
        description: savepermissionslist
        call: predictive-oncology-model-and-data-clearinghouse-home-controller.savepermissionslist
        with:
          collectionId: rest.collectionId
          path: rest.path
          selectedPermissions[]: rest.selectedPermissions[]
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: predictive-oncology-model-and-data-clearinghouse-home-controller-mcp
    port: 9090
    transport: http
    description: MCP adapter for MoDaC API — home-controller. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: savepermissionslist
      description: savepermissionslist
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: predictive-oncology-model-and-data-clearinghouse-home-controller.savepermissionslist
      with:
        collectionId: tools.collectionId
        path: tools.path
        selectedPermissions[]: tools.selectedPermissions[]
      outputParameters:
      - type: object
        mapping: $.
